description: >-
  FinOps view of Rowy spend. Rowy itself is open source (free to self-host) with
  a free hosted Base plan and a paid Pro subscription; it adds little or no
  direct compute cost because it is 100% serverless and runs inside the user's
  own Firebase/GCP project. The real, metered cost is the underlying Google
  Cloud Platform usage: Firestore storage and reads/writes, Cloud Functions
  invocations and build minutes, and Cloud Run for webhooks and Rowy Run
  services. Cost optimization therefore happens at the GCP/Firebase layer, not
  at Rowy.
notes: >-
  Rowy publishes no usage-based billing of its own beyond the Pro subscription;
  track spend in the Google Cloud billing console (Firestore, Cloud Functions,
  Cloud Run) for the connected project. Verify Pro subscription pricing and any
  GCP free-tier thresholds during reconciliation.
sources:
- https://docs.rowy.io/faqs/cost
- https://www.rowy.io/pricing
