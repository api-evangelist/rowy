actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No streaming or WebSocket surface exists, so no AsyncAPI document was
    created. The OpenAPI artifact intentionally contains empty paths because
    Rowy publishes no fixed public REST endpoints; its real interface is
    inbound webhooks plus self-hosted Rowy Run / Cloud Run services and the
    underlying Firestore data store accessed via the Firebase SDK.
